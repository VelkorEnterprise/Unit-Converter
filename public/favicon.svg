  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <text x="50%" y="50%" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="260" fill="url(#textGrad)" text-anchor="middle" dy=".35em" filter="url(#shadow)">UC</text>
